name: CI

on:
  push:
    branches:
      - main
      - 'release/**'
  pull_request:
    branches:
      - main
      - 'release/**'

permissions:
  contents: read
  packages: write

jobs:
  detect-changes:
    runs-on: ubuntu-latest
    outputs:
      client: ${{ steps.filter.outputs.client }}
      server: ${{ steps.filter.outputs.server }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Detect changed paths
        id: filter
        uses: dorny/paths-filter@v2
        with:
          filters: |
            client:
              - 'client/**'
            server:
              - 'server/**'

  client-build:
    needs: detect-changes
    if: needs.detect-changes.outputs.client == 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Restore client .env from secret (if provided)
        if: ${{ secrets.CLIENT_ENV != '' }}
        run: |
          mkdir -p client
          echo "${{ secrets.CLIENT_ENV }}" > client/.env

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 18

      - name: Install dependencies (client)
        run: npm ci --prefix client

      - name: Run client tests (if present)
        run: npm test --prefix client --if-present

      - name: Build client
        run: npm run build --prefix client

      - name: Login to GHCR
        uses: docker/login-action@v2
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push client image to GHCR
        uses: docker/build-push-action@v4
        with:
          context: ./client
          file: ./client/Dockerfile
          push: true
          tags: |
            ghcr.io/${{ github.repository_owner }}/boseth-traders-client:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  server-build:
    needs: detect-changes
    if: needs.detect-changes.outputs.server == 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Restore server .env from secret (if provided)
        if: ${{ secrets.SERVER_ENV != '' }}
        run: |
          mkdir -p server
          echo "${{ secrets.SERVER_ENV }}" > server/.env

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 18

      - name: Install dependencies (server)
        run: npm ci --prefix server

      - name: Run server tests (if present)
        run: npm test --prefix server --if-present

      - name: Login to GHCR
        uses: docker/login-action@v2
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push server image to GHCR
        uses: docker/build-push-action@v4
        with:
          context: ./server
          file: ./server/Dockerfile
          push: true
          tags: |
            ghcr.io/${{ github.repository_owner }}/boseth-traders-server:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

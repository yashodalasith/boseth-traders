name: CI

on:
  push:
    branches:
      - main
      - "release/**"
  pull_request:
    branches:
      - main
      - "release/**"

permissions:
  contents: read
  packages: write

jobs:
  detect-changes:
    runs-on: ubuntu-latest
    outputs:
      client: ${{ steps.filter.outputs.client }}
      server: ${{ steps.filter.outputs.server }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Detect changed paths
        id: filter
        uses: dorny/paths-filter@v2
        with:
          filters: |
            client:
              - 'client/**'
            server:
              - 'server/**'

  client-build:
    needs: detect-changes
    if: needs.detect-changes.outputs.client == 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Restore client .env from secret
        run: |
          mkdir -p client
          echo "${{ secrets.CLIENT_ENV }}" > client/.env

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 18

      - name: Check client test script
        id: check-tests
        run: |
          if [ -f client/package.json ]; then
            TEST=$(node -e "console.log(require('./client/package.json').scripts?.test||'')")
            if [ "$TEST" = "echo \"Error: no test specified\" && exit 1" ] || [ -z "$TEST" ]; then
              echo "has_tests=false" >> $GITHUB_OUTPUT
            else
              echo "has_tests=true" >> $GITHUB_OUTPUT
            fi
          else
            echo "has_tests=false" >> $GITHUB_OUTPUT
          fi

      - name: Install dependencies (client)
        run: npm ci --prefix client

      - name: Run client tests (if present)
        if: steps.check-tests.outputs.has_tests == 'true'
        run: npm test --prefix client

      - name: Build client
        run: npm run build --prefix client

      - name: Login to GHCR
        uses: docker/login-action@v2
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push client image to GHCR
        uses: docker/build-push-action@v4
        with:
          context: ./client
          file: ./client/Dockerfile
          push: true
          tags: |
            ghcr.io/${{ github.repository_owner }}/boseth-traders-client:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  server-build:
    needs: detect-changes
    if: needs.detect-changes.outputs.server == 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Restore server .env from secret
        run: |
          mkdir -p server
          echo "${{ secrets.SERVER_ENV }}" > server/.env

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 18

      - name: Check server test script
        id: check-tests-server
        run: |
          if [ -f server/package.json ]; then
            TEST=$(node -e "console.log(require('./server/package.json').scripts?.test||'')")
            if [ "$TEST" = "echo \"Error: no test specified\" && exit 1" ] || [ -z "$TEST" ]; then
              echo "has_tests=false" >> $GITHUB_OUTPUT
            else
              echo "has_tests=true" >> $GITHUB_OUTPUT
            fi
          else
            echo "has_tests=false" >> $GITHUB_OUTPUT
          fi

      - name: Install dependencies (server)
        run: npm ci --prefix server

      - name: Run server tests (if present)
        if: steps.check-tests-server.outputs.has_tests == 'true'
        run: npm test --prefix server

      - name: Login to GHCR
        uses: docker/login-action@v2
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push server image to GHCR
        uses: docker/build-push-action@v4
        with:
          context: ./server
          file: ./server/Dockerfile
          push: true
          tags: |
            ghcr.io/${{ github.repository_owner }}/boseth-traders-server:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
